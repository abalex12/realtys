{% extends 'base.html' %}
{% load i18n %}
{% block title %}Reset Password - Addis Realty{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:2.5rem;margin-bottom:0.75rem">🔐</div>
      <h2 class="auth-title">Reset your password</h2>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
    </div>
    <form method="post" class="mt-4">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-bold">Email address</label>
        <input type="email" name="email" class="form-control form-control-lg" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn-primary-custom w-100" style="display:flex;justify-content:center;padding:0.8rem;font-size:1rem">
        <i class="bi bi-send me-2"></i>Send Reset Link
      </button>
    </form>
    <p class="text-center mt-4 mb-0" style="font-size:0.88rem;color:var(--text-muted)">
      Remember your password? <a href="{% url 'login' %}" style="color:var(--primary);font-weight:600">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
